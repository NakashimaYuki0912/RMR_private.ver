<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RMR Hub 外观原型</title>
  <!-- PROTOTYPE ONLY: Three RMR Hub variants, switchable via ?variant=A/B/C. -->
  <style>
    :root {
      --ink: #080706;
      --paper: #e8deca;
      --paper-dim: #b9aa8e;
      --gold: #c59b55;
      --gold-pale: #e2c482;
      --gold-dark: #604728;
      --red: #8f332e;
      --red-bright: #bd5147;
      --line: rgba(205, 166, 95, .58);
      --shadow: rgba(0, 0, 0, .78);
      font-family: "Noto Serif SC", "Source Han Serif SC", "SimSun", Georgia, serif;
      color: var(--paper);
      background: #040403;
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    button { font: inherit; }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .34;
      background:
        repeating-linear-gradient(0deg, transparent 0 3px, rgba(255,255,255,.015) 3px 4px),
        radial-gradient(circle at 50% 42%, rgba(126, 92, 45, .12), transparent 42%),
        #050504;
      mix-blend-mode: screen;
      z-index: 20;
    }

    .prototype-note {
      position: fixed;
      top: 18px;
      right: 22px;
      z-index: 30;
      padding: 6px 11px;
      border: 1px solid rgba(226,196,130,.5);
      background: rgba(5,5,4,.78);
      color: var(--paper-dim);
      font: 11px/1.2 Consolas, monospace;
      letter-spacing: .12em;
    }

    .variant { display: none; width: 100%; height: 100%; position: relative; }
    .variant.active { display: block; }
    .ornament-line { height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
    .eyebrow { color: var(--gold); letter-spacing: .28em; font-size: 12px; text-transform: uppercase; }
    .muted { color: var(--paper-dim); }

    .sigil {
      position: relative;
      width: 118px;
      height: 118px;
      border: 1px solid var(--gold);
      transform: rotate(45deg);
      box-shadow: 0 0 0 8px rgba(197,155,85,.05), inset 0 0 28px rgba(197,155,85,.12);
    }
    .sigil::before, .sigil::after {
      content: "";
      position: absolute;
      inset: 17px;
      border: 1px solid rgba(226,196,130,.65);
      border-radius: 50%;
    }
    .sigil::after { inset: 40px; background: var(--red); border-radius: 0; }

    .menu-button {
      border: 0;
      color: var(--paper);
      cursor: pointer;
      transition: transform .16s ease, color .16s ease, border-color .16s ease, background .16s ease;
    }
    .menu-button:hover { color: #fff7df; transform: translateX(7px); }
    .menu-button.danger { color: #cf8e85; }

    /* A — invitation ledger */
    .variant-a {
      background:
        linear-gradient(90deg, rgba(3,3,3,.96) 0 42%, rgba(3,3,3,.66) 70%, rgba(3,3,3,.92)),
        url("../../ArtWork/随机事件背景1.png") center/cover no-repeat;
    }
    .a-frame { position: absolute; inset: 32px; border: 1px solid rgba(197,155,85,.42); }
    .a-frame::before, .a-frame::after { content:""; position:absolute; width:78px; height:78px; border-color:var(--gold); }
    .a-frame::before { left:-1px; top:-1px; border-left:3px solid; border-top:3px solid; }
    .a-frame::after { right:-1px; bottom:-1px; border-right:3px solid; border-bottom:3px solid; }
    .a-title {
      position: absolute;
      left: 8vw;
      top: 14vh;
      width: 34vw;
      min-width: 390px;
    }
    .a-title h1 { margin: 18px 0 10px; font-size: clamp(44px, 5vw, 82px); font-weight: 500; letter-spacing: .05em; line-height: .98; }
    .a-title h1 span { display: block; color: var(--gold); font-size: .42em; margin-top: 18px; letter-spacing: .25em; }
    .a-title .sigil { margin: 48px 0 58px 32px; }
    .a-title p { max-width: 520px; line-height: 1.9; color: var(--paper-dim); font-size: 15px; }
    .a-menu {
      position: absolute;
      right: 7vw;
      top: 10vh;
      width: min(520px, 42vw);
      display: grid;
      gap: 9px;
    }
    .a-menu::before { content:"RECEPTION INDEX"; color:var(--gold-dark); letter-spacing:.32em; font-size:11px; margin:0 0 10px 68px; }
    .a-menu .menu-button {
      min-height: 67px;
      padding: 8px 24px 8px 82px;
      position: relative;
      text-align: left;
      background: linear-gradient(90deg, rgba(21,18,14,.95), rgba(8,8,7,.82));
      border-left: 2px solid var(--gold-dark);
      border-bottom: 1px solid rgba(197,155,85,.22);
      clip-path: polygon(0 0, 96% 0, 100% 50%, 96% 100%, 0 100%, 13px 50%);
    }
    .a-menu .menu-button:hover { border-left-color: var(--gold-pale); background: linear-gradient(90deg, rgba(84,59,28,.95), rgba(14,12,9,.86)); }
    .a-menu .num { position:absolute; left:24px; top:18px; color:var(--gold); font-size:13px; letter-spacing:.1em; }
    .a-menu strong { display:block; font-size:20px; font-weight:500; letter-spacing:.14em; }
    .a-menu small { display:block; margin-top:5px; color:#998c76; font:11px/1.2 Arial,sans-serif; letter-spacing:.08em; }
    .a-menu .primary { border-left-color: var(--gold); box-shadow: -10px 0 25px rgba(197,155,85,.08); }

    /* B — open archive */
    .variant-b {
      display: none;
      place-items: center;
      background:
        radial-gradient(circle at 50% 30%, rgba(133,93,45,.18), transparent 38%),
        linear-gradient(rgba(5,4,3,.84), rgba(5,4,3,.96)),
        url("../../ArtWork/随机事件背景2.png") center/cover no-repeat;
    }
    .variant-b.active { display:grid; }
    .book {
      width: min(1180px, 88vw);
      height: min(690px, 80vh);
      position: relative;
      display: grid;
      grid-template-columns: 1fr 1fr;
      filter: drop-shadow(0 30px 60px #000);
    }
    .book::before {
      content:"";
      position:absolute;
      left:50%; top:0; bottom:0; width:22px; transform:translateX(-50%);
      background: linear-gradient(90deg, rgba(0,0,0,.6), rgba(197,155,85,.18), rgba(0,0,0,.72));
      z-index:4;
    }
    .page {
      position: relative;
      overflow: hidden;
      padding: 50px 56px 40px;
      background:
        linear-gradient(90deg, rgba(0,0,0,.22), transparent 12% 86%, rgba(0,0,0,.28)),
        linear-gradient(#1a1610, #0d0c09);
      border: 1px solid #70512d;
      box-shadow: inset 0 0 60px rgba(0,0,0,.72);
    }
    .page.left { border-radius: 18px 2px 2px 18px; }
    .page.right { border-radius: 2px 18px 18px 2px; }
    .page::after { content:""; position:absolute; inset:18px; border:1px solid rgba(197,155,85,.22); pointer-events:none; }
    .book-title { text-align:center; margin-bottom:30px; }
    .book-title h2 { margin:10px 0; font-weight:500; font-size:31px; letter-spacing:.18em; }
    .book-title .roman { color:var(--gold); font-size:12px; letter-spacing:.3em; }
    .seal { width:74px; height:74px; margin:0 auto 14px; border:1px solid var(--gold); border-radius:50%; display:grid; place-items:center; color:var(--red-bright); font-size:28px; box-shadow:inset 0 0 22px rgba(197,155,85,.15); }
    .book-actions { display:grid; gap:13px; }
    .book-actions .menu-button {
      display:grid;
      grid-template-columns:46px 1fr auto;
      align-items:center;
      width:100%;
      min-height:58px;
      padding:7px 16px 7px 8px;
      text-align:left;
      background:rgba(0,0,0,.22);
      border:1px solid rgba(197,155,85,.24);
    }
    .book-actions .menu-button:hover { transform:translateY(-2px); border-color:var(--gold); background:rgba(96,71,40,.24); }
    .book-actions .mark { width:34px; height:34px; border:1px solid var(--gold-dark); display:grid; place-items:center; color:var(--gold); transform:rotate(45deg); }
    .book-actions .mark span { transform:rotate(-45deg); font-size:11px; }
    .book-actions strong { font-weight:500; letter-spacing:.12em; font-size:17px; }
    .book-actions em { color:#857760; font-style:normal; font-size:11px; }
    .page-footer { position:absolute; left:55px; right:55px; bottom:32px; display:flex; justify-content:space-between; color:#6f634f; font-size:11px; letter-spacing:.16em; }

    /* C — route constellation */
    .variant-c {
      background:
        linear-gradient(rgba(3,3,3,.76), rgba(3,3,3,.92)),
        url("../../ArtWork/随机事件背景3.png") center/cover no-repeat;
    }
    .c-header { position:absolute; top:42px; left:54px; right:54px; display:flex; justify-content:space-between; align-items:center; }
    .c-header h2 { margin:0; font-size:26px; font-weight:500; letter-spacing:.2em; }
    .c-header .progress { color:#7c6c52; font-size:11px; letter-spacing:.2em; }
    .route-map { position:absolute; inset:110px 70px 95px; border:1px solid rgba(197,155,85,.18); overflow:hidden; }
    .route-map::before {
      content:"";
      position:absolute; inset:0;
      background:
        linear-gradient(27deg, transparent 49.7%, rgba(197,155,85,.18) 50%, transparent 50.3%),
        linear-gradient(153deg, transparent 49.7%, rgba(197,155,85,.12) 50%, transparent 50.3%),
        radial-gradient(circle at center, rgba(197,155,85,.12), transparent 29%);
    }
    .center-sigil { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); text-align:center; }
    .center-sigil .ring { width:180px; height:180px; border:1px solid var(--gold); border-radius:50%; display:grid; place-items:center; box-shadow:0 0 50px rgba(197,155,85,.13); }
    .center-sigil .ring::before { content:"RMR"; width:112px; height:112px; border:1px solid var(--gold-dark); display:grid; place-items:center; transform:rotate(45deg); color:var(--gold-pale); font-size:23px; letter-spacing:.18em; }
    .center-sigil p { color:#766b58; letter-spacing:.18em; font-size:11px; margin-top:20px; }
    .node {
      position:absolute;
      width:180px;
      min-height:74px;
      padding:12px 16px 10px 58px;
      text-align:left;
      background:rgba(8,8,7,.88);
      border:1px solid rgba(197,155,85,.35);
      color:var(--paper);
      cursor:pointer;
      transition:.18s ease;
    }
    .node:hover { border-color:var(--gold-pale); background:rgba(70,49,25,.75); transform:scale(1.04); z-index:4; }
    .node::before { content:attr(data-mark); position:absolute; left:15px; top:18px; width:30px; height:30px; border:1px solid var(--gold-dark); display:grid; place-items:center; color:var(--gold); font-size:10px; transform:rotate(45deg); }
    .node span { display:block; font-size:16px; letter-spacing:.1em; }
    .node small { color:#7d725f; font:10px/1.3 Arial,sans-serif; }
    .n1 { left:8%; top:11%; } .n2 { left:8%; bottom:12%; }
    .n3 { right:8%; top:11%; } .n4 { right:8%; bottom:12%; }
    .n5 { left:28%; top:5%; } .n6 { right:28%; bottom:5%; }
    .n7 { left:50%; bottom:4%; transform:translateX(-50%); }
    .n7:hover { transform:translateX(-50%) scale(1.04); }
    .c-legend { position:absolute; left:70px; bottom:45px; color:#786c59; font-size:11px; letter-spacing:.12em; }

    .switcher {
      position: fixed;
      z-index: 50;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: 44px minmax(250px, auto) 44px;
      align-items: center;
      border: 1px solid #d7b66f;
      background: rgba(4,4,3,.96);
      box-shadow: 0 10px 40px #000;
    }
    .switcher button { height:40px; border:0; background:#18140e; color:var(--gold-pale); cursor:pointer; font-size:19px; }
    .switcher button:hover { background:#4b351d; }
    .switch-label { text-align:center; color:var(--paper); font:12px/1.2 Arial,sans-serif; letter-spacing:.08em; padding:0 16px; }
    .choice-toast { position:fixed; z-index:45; left:50%; bottom:72px; transform:translateX(-50%); padding:8px 14px; background:rgba(5,5,4,.9); border:1px solid rgba(197,155,85,.4); color:var(--paper-dim); font:12px Arial,sans-serif; opacity:0; transition:opacity .2s; }
    .choice-toast.show { opacity:1; }

    @media (max-width: 980px) {
      .a-title { left:5vw; width:38vw; min-width:310px; }
      .a-menu { right:4vw; width:48vw; }
      .book { width:94vw; }
      .page { padding-left:30px; padding-right:30px; }
      .node { width:150px; padding-left:48px; }
    }
  </style>
</head>
<body>
  <div class="prototype-note">THROWAWAY HUB PROTOTYPE · ← / → 切换</div>

  <main id="variant-A" class="variant variant-a">
    <div class="a-frame"></div>
    <section class="a-title">
      <div class="eyebrow">Library Invitation · RMR</div>
      <h1>肉鸽接待<span>ROGUELIKE MOD REBORN</span></h1>
      <div class="sigil"></div>
      <div class="ornament-line"></div>
      <p>选择这次接待的开始方式。旅程会改变当前路线，解放与图鉴则会留下永久记录。</p>
    </section>
    <nav class="a-menu" aria-label="Hub actions">
      <button class="menu-button primary" data-action="正常游玩"><i class="num">I</i><strong>正常游玩</strong><small>BEGIN A NEW ROGUELIKE RECEPTION</small></button>
      <button class="menu-button primary" data-action="继续旅程"><i class="num">II</i><strong>继续旅程</strong><small>RESUME THE SAVED ROUTE</small></button>
      <button class="menu-button" data-action="挑战解放战"><i class="num">III</i><strong>挑战解放战</strong><small>FLOOR REALIZATION</small></button>
      <button class="menu-button" data-action="玩法介绍"><i class="num">IV</i><strong>玩法介绍</strong><small>HOW TO PLAY</small></button>
      <button class="menu-button" data-action="图鉴"><i class="num">V</i><strong>图鉴</strong><small>PERMANENT ATLAS</small></button>
      <button class="menu-button danger" data-action="重置永久进度"><i class="num">VI</i><strong>重置永久进度</strong><small>RESET ARCHIVE</small></button>
      <button class="menu-button danger" data-action="退出"><i class="num">VII</i><strong>退出</strong><small>RETURN TO INVITATION</small></button>
    </nav>
  </main>

  <main id="variant-B" class="variant variant-b">
    <div class="book">
      <section class="page left">
        <header class="book-title"><div class="seal">R</div><div class="roman">VOLUME I</div><h2>开始旅程</h2><div class="ornament-line"></div></header>
        <div class="book-actions">
          <button class="menu-button" data-action="正常游玩"><i class="mark"><span>I</span></i><strong>正常游玩</strong><em>新接待</em></button>
          <button class="menu-button" data-action="继续旅程"><i class="mark"><span>II</span></i><strong>继续旅程</strong><em>读取路线</em></button>
          <button class="menu-button" data-action="挑战解放战"><i class="mark"><span>III</span></i><strong>挑战解放战</strong><em>永久解锁</em></button>
        </div>
        <footer class="page-footer"><span>THE CITY</span><span>01</span></footer>
      </section>
      <section class="page right">
        <header class="book-title"><div class="seal">A</div><div class="roman">ARCHIVE</div><h2>馆藏与记录</h2><div class="ornament-line"></div></header>
        <div class="book-actions">
          <button class="menu-button" data-action="玩法介绍"><i class="mark"><span>IV</span></i><strong>玩法介绍</strong><em>旅程规则</em></button>
          <button class="menu-button" data-action="图鉴"><i class="mark"><span>V</span></i><strong>图鉴</strong><em>永久收藏</em></button>
          <button class="menu-button danger" data-action="重置永久进度"><i class="mark"><span>VI</span></i><strong>重置永久进度</strong><em>谨慎操作</em></button>
          <button class="menu-button danger" data-action="退出"><i class="mark"><span>VII</span></i><strong>退出</strong><em>返回邀请</em></button>
        </div>
        <footer class="page-footer"><span>THE LIBRARY</span><span>02</span></footer>
      </section>
    </div>
  </main>

  <main id="variant-C" class="variant variant-c">
    <header class="c-header"><div><div class="eyebrow">RMR ROUTE CONTROL</div><h2>选择旅程入口</h2></div><div class="progress">URBAN MYTH — IMPURITAS CIVITATIS</div></header>
    <section class="route-map">
      <div class="center-sigil"><div class="ring"></div><p>ROGUELIKE RECEPTION</p></div>
      <button class="node n1" data-mark="I" data-action="正常游玩"><span>正常游玩</span><small>开启新路线</small></button>
      <button class="node n2" data-mark="II" data-action="继续旅程"><span>继续旅程</span><small>恢复存档</small></button>
      <button class="node n3" data-mark="III" data-action="挑战解放战"><span>挑战解放战</span><small>楼层最终试炼</small></button>
      <button class="node n4" data-mark="IV" data-action="玩法介绍"><span>玩法介绍</span><small>阅读旅程规则</small></button>
      <button class="node n5" data-mark="V" data-action="图鉴"><span>图鉴</span><small>查看永久馆藏</small></button>
      <button class="node n6 danger" data-mark="VI" data-action="重置永久进度"><span>重置永久进度</span><small>清除馆藏记录</small></button>
      <button class="node n7 danger" data-mark="VII" data-action="退出"><span>退出</span><small>返回邀请界面</small></button>
    </section>
    <div class="c-legend">节点代表入口，不改变现有 Hub 功能与门控逻辑。</div>
  </main>

  <div id="toast" class="choice-toast"></div>
  <div class="switcher" aria-label="Prototype variant switcher">
    <button id="prev" aria-label="Previous variant">←</button>
    <div id="switch-label" class="switch-label"></div>
    <button id="next" aria-label="Next variant">→</button>
  </div>

  <script>
    const variants = [
      { key: "A", name: "邀请函式纵向菜单" },
      { key: "B", name: "展开的馆藏册" },
      { key: "C", name: "都市路线图" }
    ];

    const params = new URLSearchParams(location.search);
    let current = variants.findIndex(v => v.key === (params.get("variant") || "A").toUpperCase());
    if (current < 0) current = 0;

    function render() {
      const selected = variants[current];
      document.querySelectorAll(".variant").forEach(el => el.classList.remove("active"));
      document.getElementById(`variant-${selected.key}`).classList.add("active");
      document.getElementById("switch-label").textContent = `${selected.key} — ${selected.name}`;
      const url = new URL(location.href);
      url.searchParams.set("variant", selected.key);
      history.replaceState({}, "", url);
    }

    function cycle(delta) {
      current = (current + delta + variants.length) % variants.length;
      render();
    }

    document.getElementById("prev").addEventListener("click", () => cycle(-1));
    document.getElementById("next").addEventListener("click", () => cycle(1));
    document.addEventListener("keydown", event => {
      const tag = document.activeElement?.tagName;
      if (["INPUT", "TEXTAREA"].includes(tag) || document.activeElement?.isContentEditable) return;
      if (event.key === "ArrowLeft") cycle(-1);
      if (event.key === "ArrowRight") cycle(1);
    });

    document.querySelectorAll("[data-action]").forEach(button => {
      button.addEventListener("click", () => {
        const toast = document.getElementById("toast");
        toast.textContent = `原型交互：${button.dataset.action}（不会修改游戏数据）`;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 1400);
      });
    });

    render();
  </script>
</body>
</html>
